language = "C"
cpp_compat = true
include_guard = "ISO532_H"
usize_is_size_t = true
header = """/* iso532 C ABI v1 — batch and streaming interfaces are frozen.
 * Generated by cbindgen from iso532-ffi; do not edit by hand.
 * Regenerate: cbindgen --config cbindgen.toml --crate iso532-ffi --output include/iso532.h */"""

[export]
exclude = ["iso532__test_panic", "iso532__test_panic_rayon", "iso532__test_panic_stream"]
