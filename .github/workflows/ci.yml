name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      REQUIRE_AVX2: "1"
      # Windows UCRT libm dispatches by CPU and varies by OS build, so frozen
      # hash constants only hold on the machine that recorded them: assert on
      # linux (glibc stable across runners), dump-only on windows CI.
      HASH_GATE_DUMP_ONLY: ${{ matrix.os == 'windows-latest' && '1' || '0' }}
    defaults:
      run:
        working-directory: iso532
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: iso532
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --lib
      - run: cargo test --doc
      # golden_* / annexb tests need data/ (164 MB, not in repo) and stay
      # local-only until R3 hardens the golden regeneration chain (R-14).
      - run: >
          cargo test
          --test simd_parity
          --test simd_dispatch
          --test determinism
          --test api_errors
          --test hash_gate

  ffi:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: iso532-ffi
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: iso532-ffi
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      # 一般測試 + panic 注入(test-panic feature 打開時兩者都跑)
      - run: cargo test --features test-panic
      - run: cargo build --release
      - name: C smoke (gcc)
        if: matrix.os == 'ubuntu-latest'
        run: |
          gcc -Wall -Wextra -Iinclude tests/smoke.c -Ltarget/release -liso532_ffi -lm -o smoke
          LD_LIBRARY_PATH=target/release ./smoke
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        if: matrix.os == 'windows-latest'
        with:
          arch: x64
      - name: C smoke (MSVC)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          cl /nologo /W3 /Iinclude tests\smoke.c /link /LIBPATH:target\release iso532_ffi.dll.lib
          copy target\release\iso532_ffi.dll . >NUL
          smoke.exe
  py:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: iso532-py
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: iso532-py
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: pip install maturin && maturin build --release --out dist
      - name: install wheel into clean venv, run smoke suite
        run: |
          python -m venv sv
          if [ -x sv/bin/python ]; then VP=sv/bin/python; else VP=sv/Scripts/python.exe; fi
          "$VP" -m pip install --quiet dist/*.whl pytest
          "$VP" -m pytest tests/test_smoke.py -v
      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}
          path: iso532-py/dist/*.whl
          if-no-files-found: error
