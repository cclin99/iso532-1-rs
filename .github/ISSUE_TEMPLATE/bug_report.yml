name: Bug report
description: Report a reproducible defect in the Rust, C, or Python interface
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - Rust batch
        - Rust stream
        - C ABI
        - Python
        - CLI or tooling
        - Documentation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or full commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, CPU, Rust/Python versions, SIMD availability, and Rayon thread count if relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the exact command and a minimal input or fixture that can legally be shared.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: measurement
    attributes:
      label: Measurement context
      description: For numerical results, state units, calibration chain, sample rate, field type, and comparison reference.
