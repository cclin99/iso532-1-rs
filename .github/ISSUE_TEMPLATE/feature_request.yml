name: Feature request
description: Propose a focused capability or contract change
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem should ISO532 solve, and for which interface or workflow?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe inputs, outputs, units, error semantics, and compatibility expectations.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Reference or validation evidence
      description: Include standards references, reproducible fixtures, or comparison implementations when relevant.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary checks
      options:
        - label: I have distinguished calibrated pascal input from raw dBFS.
        - label: I have identified any impact on numerical hashes, Rust API, C ABI v1, or Python layouts.
